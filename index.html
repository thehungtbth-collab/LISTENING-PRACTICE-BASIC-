nt.querySelector('.token[data-id=\"'+g.dataset.tid+'\"]');\n                if(t) t.classList.remove('used');\n                g.textContent = ''; delete g.dataset.tid; g.classList.remove('correct','wrong');\n                const fb = g.nextSibling; if(fb && fb.classList.contains('gap-feedback')) fb.remove();\n            }\n        });\n    });\n\n    window.checkGaps = function() {\n        let score = 0; document.querySelectorAll('.gap-feedback').forEach(e => e.remove());\n        gaps.forEach(g => {\n            const idx = parseInt(g.dataset.idx); const ansObj = gapsData.find(x => x.index === idx); if(!ansObj) return;\n            if(g.textContent.trim().toLowerCase() === ansObj.word.trim().toLowerCase()) { g.classList.add('correct'); g.classList.remove('wrong'); score++; } \n            else { g.classList.add('wrong'); g.classList.remove('correct'); const s = document.createElement('span'); s.className = 'gap-feedback'; s.textContent = ansObj.word; g.parentNode.insertBefore(s, g.nextSibling); }\n        });\n        alert('Score: ' + score + '/' + gapsData.length);\n    };\n    window.resetGaps = function() {\n        gaps.forEach(g => { if(g.dataset.tid) { const t = document.querySelector('.token[data-id=\"'+g.dataset.tid+'\"]'); if(t) t.classList.remove('used'); } g.textContent = ''; delete g.dataset.tid; g.classList.remove('correct','wrong'); });\n        document.querySelectorAll('.gap-feedback').forEach(e => e.remove());\n    };\n\n    // MCQ Logic\n    const mcqContainer = document.getElementById('mcqContainer');\n    mcqData.forEach((m, i) => {\n        const d = document.createElement('div'); d.className = 'mcq-q'; d.dataset.id = m.id;\n        if(m.marker) d.dataset.marker = m.marker;\n        \n        d.innerHTML = '<strong>' + (i+1) + '. ' + m.question + '</strong>';\n        m.options.forEach(o => d.innerHTML += '<label><input type=\"checkbox\" value=\"'+o.key+'\"> '+o.key+'. '+o.text+'</label>');\n        mcqContainer.appendChild(d);\n    });\n    window.checkMcq = function() {\n        let score = 0; document.querySelectorAll('.mcq-feedback').forEach(e=>e.remove());\n        mcqData.forEach(m => {\n            const div = document.querySelector('.mcq-q[data-id=\"'+m.id+'\"]');\n            const inputs = div.querySelectorAll('input:checked');\n            const chosen = Array.from(inputs).map(i=>i.value);\n            const correct = m.options.filter(o=>o.correct).map(o=>o.key);\n            const isCorrect = chosen.length === correct.length && chosen.every(v => correct.includes(v));\n            const fb = document.createElement('div'); fb.className = 'mcq-feedback';\n            if(isCorrect) { fb.style.color = 'green'; fb.textContent = 'Correct!'; score++; } \n            else { fb.style.color = 'red'; fb.textContent = 'Incorrect. Key: ' + correct.join(', '); }\n            div.appendChild(fb);\n        });\n        document.getElementById('mcqScore').textContent = 'MCQ Score: ' + score + '/' + mcqData.length;\n    };\n    window.resetMcq = function() { document.querySelectorAll('.mcq-q input').forEach(i => i.checked = false); document.querySelectorAll('.mcq-feedback').forEach(e=>e.remove()); document.getElementById('mcqScore').textContent = ''; };\n<\/script>\n</body>\n</html>"}];
    const select = document.getElementById('selectBai');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const frame = document.getElementById('frame');
    const controlsBar = document.getElementById('controlsBar');

    // populate select
    items.forEach((it, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = it.name || it.filename || ('Bài ' + (idx+1));
      select.appendChild(opt);
    });

    function enterFullscreenMode() {
      // hide controls and expand iframe
      controlsBar.classList.add('hidden');
      frame.classList.add('fullscreen-frame');

      // create close button if chưa có
      if (!document.getElementById('closeFullscreen')) {
        const btn = document.createElement('button');
        btn.id = 'closeFullscreen';
        btn.textContent = 'Đóng toàn màn hình';
        btn.onclick = exitFullscreenMode;
        document.body.appendChild(btn);
      }
    }

    function exitFullscreenMode() {
      // restore controls and iframe
      controlsBar.classList.remove('hidden');
      frame.classList.remove('fullscreen-frame');
      const btn = document.getElementById('closeFullscreen');
      if (btn) btn.remove();
    }

    openBtn.onclick = () => {
      const v = select.value;
      if (v === '') {
        alert('Vui lòng chọn một bài.');
        return;
      }
      const it = items[+v];
      frame.srcdoc = it.content;

      // vào chế độ toàn màn hình
      enterFullscreenMode();
    };

    clearBtn.onclick = () => {
      select.value = '';
      frame.srcdoc = '<p>Chưa chọn bài</p>';
    };

    // allow Enter key to open when select focused
    select.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') openBtn.click();
    });

    // Escape để thoát toàn màn hình
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        exitFullscreenMode();
      }
    });
  </script>
</body>
</html>
